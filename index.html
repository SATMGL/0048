    // ── SIMPAN KODE DARI HALAMAN SETING (MODE ADMIN) ──
    async function doSetingSimpan() {
      const namaSheet = document.getElementById('select-bulan').value;
      if (!namaSheet) return;

      const rows = document.querySelectorAll('#tbody-personil tr[data-row-idx]');
      if (!rows.length) return;

      // Siapkan array 10 baris default kosong
      const data = Array.from({length: 10}, () => ['']);
      rows.forEach(tr => {
        const idx   = parseInt(tr.dataset.rowIdx);
        if (idx < 0 || idx > 9) return;
        // Coba baca dari badge edit dulu, fallback ke span biasa
        const badge = tr.querySelector('.kode-badge-edit');
        const span  = tr.querySelector('td:last-child span');
        let val = '';
        if (badge) {
          val = (badge.dataset.kode || '').toString().trim();
        } else if (span) {
          val = span.textContent.replace('–','').replace('-','').trim();
        }
        data[idx] = [val];
      });

      const btn = document.getElementById('btn-seting-simpan');
      const status = document.getElementById('seting-save-status');
      btn.disabled = true;
      btn.textContent = '⏳ Menyimpan...';
      status.textContent = '';

      try {
        const res  = await fetch(APPS_SCRIPT_URL, {
          method: 'POST', redirect: 'follow',
          body: JSON.stringify({ action: 'write', sheet: namaSheet, range: 'AM6:AM15', values: data })
        });
        const json = await res.json();
        if (json.status !== 'ok') throw new Error(json.message);
        status.style.color = '#16a34a';
        status.textContent = '✅ Tersimpan!';
        btn.textContent = '💾 SIMPAN KODE';
        setTimeout(() => { status.textContent = ''; }, 3000);
      } catch(err) {
        status.style.color = '#dc2626';
        status.textContent = '❌ ' + err.message;
        btn.textContent = '💾 SIMPAN KODE';
      } finally {
        btn.disabled = false;
      }
    }

    // Tentukan class berdasarkan buff label dari POLA SHIFT
    function buffToKodeClass(buff) {
      const b = singkatBuff((buff || '').toString().trim());
      if (b === 'NS')   return 'kode-ns';
      if (b === 'UMUM') return 'kode-umum';
      if (b === 'XNS')  return 'kode-xns';
      if (b === 'PLR')  return 'kode-plr';
      return 'kode-nil';
    }

    // Cari buff dari kode, lalu kembalikan class warna
    function kodeToClass(kode) {
      const k = (kode || '').toString().trim().toUpperCase();
      const polaMap = Object.keys(_polaKodeMapSeting).length ? _polaKodeMapSeting : _kodeInfo;
      const info = polaMap[k];
      const buff = typeof info === 'object' ? info?.buff : info;
      if (buff) return buffToKodeClass(buff);
      // Fallback hardcode jika pola belum termuat
      if (['A','B'].includes(k))                      return 'kode-ns';
      if (['C','D','E','F'].includes(k))              return 'kode-umum';
      if (['G','H'].includes(k))                      return 'kode-xns';
      if (['I','J'].includes(k))                      return 'kode-plr';
      return 'kode-nil';
    }

    function kodeColor(kode) {
      const cls = kodeToClass(kode);
      if (cls === 'kode-ns')   return { bg:'#fef08a', btnBg:'#fef9c3', shadow:'#a16207', text:'#713f12' };
      if (cls === 'kode-umum') return { bg:'#a7f3d0', btnBg:'#d1fae5', shadow:'#059669', text:'#065f46' };
      if (cls === 'kode-xns')  return { bg:'#ddd6fe', btnBg:'#ede9fe', shadow:'#5b21b6', text:'#4c1d95' };
      if (cls === 'kode-plr')  return { bg:'#fed7aa', btnBg:'#ffedd5', shadow:'#c2410c', text:'#7c2d12' };
      return { bg:'#e2e8f0', btnBg:'#f1f5f9', shadow:'#475569', text:'#1e293b' };
    }

    function fitTabel() {
      requestAnimationFrame(() => {
        const page    = document.getElementById('seting');
        const bar     = page.querySelector('.seting-bulan-bar');
        const wrapper = document.getElementById('tabel-wrapper');
        const saveBar = document.getElementById('seting-save-bar');
        const tabel   = document.getElementById('tabel-personil');
        const rows    = tabel.querySelectorAll('tr');
        if (!rows.length) return;

        const padPage  = parseFloat(getComputedStyle(page).paddingTop) + parseFloat(getComputedStyle(page).paddingBottom);
        const gapBar   = parseFloat(getComputedStyle(bar).marginBottom) || 0;
        const saveBarH = saveBar.classList.contains('visible') ? (saveBar.offsetHeight + 6) : 0;
        const availH   = page.clientHeight - padPage - bar.offsetHeight - gapBar - saveBarH;
        if (availH <= 0) return;

        wrapper.style.height = availH + 'px';
        wrapper.style.overflow = 'hidden';

        const borderTotal = 6 + (rows.length * 2);
        const rowH = Math.floor((availH - borderTotal) / rows.length);
        const fs   = Math.min(14, Math.max(9, Math.floor(rowH * 0.58)));

        wrapper.style.setProperty('--row-h', rowH + 'px');
        wrapper.style.setProperty('--tbl-fs', fs + 'px');
      });
    }

    window.addEventListener('resize', () => {
      if (document.getElementById('tabel-wrapper').classList.contains('visible')) fitTabel();
      if (document.getElementById('pola-wrapper').classList.contains('visible')) fitPolaTable();
      if (document.getElementById('jadwal-table-wrapper').classList.contains('visible')) fitJadwalTable();
    });

    // ── POLA ──
    async function loadPola() {
      const wrapper = document.getElementById('pola-wrapper');

      showLoading('MEMUAT POLA SHIFT...');
      wrapper.classList.remove('visible');

      try {
        const url = `${APPS_SCRIPT_URL}?action=read&sheet=${encodeURIComponent('POLA SHIFT')}&range=B2:J12`;
        const res  = await fetch(url, { redirect: 'follow' });
        const json = await res.json();
        if (json.status !== 'ok') throw new Error(json.message);

        const HARI = ['SEN','SEL','RAB','KAM','JUM'];
        const tbody = document.getElementById('tbody-pola');
        tbody.innerHTML = '';
        let ada = false;

        json.data.slice(1).forEach(row => {
          const no   = (row[0] || '').toString().trim();
          const kode = (row[1] || '').toString().trim();
          const buffRaw = (row[2] || '').toString().trim();
          const buff = singkatBuff(buffRaw);
          if (!no && !kode) return;
          ada = true;

          const clr = kodeColor(kode);
          const rowBg = clr ? `background:${clr.bg};` : '';

          // kode button
          const btnStyle = clr
            ? `background:${clr.bg};color:${clr.text};border:1px solid ${clr.shadow};box-shadow:0 2px 0 ${clr.shadow};border-radius:3px;padding:0 1px;font-weight:800;font-size:var(--ptbl-fs,0.58em);cursor:default;display:block;line-height:1.5;width:100%;overflow:hidden;text-overflow:clip;white-space:nowrap;text-align:center;`
            : `background:#e2e8f0;color:#475569;border:1px solid #94a3b8;box-shadow:0 2px 0 #64748b;border-radius:3px;padding:0 1px;font-weight:800;font-size:var(--ptbl-fs,0.58em);cursor:default;display:block;line-height:1.5;width:100%;overflow:hidden;text-overflow:clip;white-space:nowrap;text-align:center;`;

          // hari cells (index 3-7)
          let hariTds = '';
          for (let h = 0; h < 5; h++) {
            const val = (row[3 + h] || '').toString().trim().toUpperCase();
            const HARI_NAMA = ['SEN','SEL','RAB','KAM','JUM'];
            if (_isAdmin) {
              // Mode admin: cell bisa diklik
              const vCls = val==='P' ? 'val-p' : val==='SM' ? 'val-sm' : val==='OFF' ? 'val-off' : 'val-kosong';
              hariTds += `<td style="${rowBg}padding:2px;" data-hari="${h}" data-kode="${kode}">
                <div class="shift-cell-edit ${vCls}" data-val="${val}" onclick="openShiftPicker(this,'${kode}',${h},'${HARI_NAMA[h]}')">${val||'–'}</div>
              </td>`;
            } else {
              let cls = '', cellBg = rowBg;
              if (val === 'P')   { cls = 'shift-p';   cellBg = 'background:#bfdbfe;'; }
              else if (val === 'SM')  { cls = 'shift-sm';  cellBg = 'background:#fef08a;'; }
              else if (val === 'OFF') { cls = 'shift-off'; cellBg = rowBg; }
              else { cellBg = rowBg; }
              hariTds += `<td class="${cls}" style="${cellBg}">${val || ''}</td>`;
            }
          }

          const nilai = (row[8] || '').toString().trim();

          tbody.innerHTML += `<tr style="${rowBg}">
            <td style="${rowBg}">${no}</td>
            <td style="${rowBg};text-align:center;"><span style="${btnStyle}">${kode || '-'}</span></td>
            <td style="${rowBg};cursor:pointer;user-select:none;" onclick="showBuffTooltip(event,'${buffRaw.replace(/'/g,"&#39;")}')">${buff}</td>
            ${hariTds}
            <td style="${rowBg}">${nilai}</td>
          </tr>`;
        });

        hideToast();
        hideLoading();
        if (ada) {
          wrapper.classList.add('visible');
          if (_isAdmin) document.getElementById('pola-save-bar').classList.add('visible');
          else          document.getElementById('pola-save-bar').classList.remove('visible');
          fitPolaTable();
        } else {
          wrapper.classList.remove('visible');
          showToast('⚠ Tidak ada data pola.', 'err', 5000);
        }
      } catch (err) {
        hideLoading();
        showToast('❌ Gagal memuat: ' + err.message, 'err', 5000);
      }
    }

    // ── TOOLTIP BUFF ──
    let _buffTimer = null;
    function showBuffTooltip(e, label) {
      const tip = document.getElementById('buff-tooltip');
      tip.textContent = label;

      // Posisi: di atas / bawah titik klik, pastikan tidak keluar layar
      const x = e.clientX;
      const y = e.clientY;
      tip.style.left = '0px';
      tip.style.top  = '0px';
      tip.classList.remove('show');

      requestAnimationFrame(() => {
        const tw = tip.offsetWidth;
        const th = tip.offsetHeight;
        const vw = window.innerWidth;
        const vh = window.innerHeight;

        let left = x - tw / 2;
        let top  = y - th - 12;   // default: di atas kursor

        if (left < 6)        left = 6;
        if (left + tw > vw - 6) left = vw - tw - 6;
        if (top < 6)         top  = y + 20;  // kalau terlalu atas, pindah ke bawah
        if (top + th > vh - 6) top = y - th - 12;

        tip.style.left = left + 'px';
        tip.style.top  = top  + 'px';
        tip.classList.add('show');
      });

      // Auto-hilang setelah 1.8 detik
      clearTimeout(_buffTimer);
      _buffTimer = setTimeout(() => {
        tip.classList.remove('show');
      }, 1800);
    }

    // ── Peta singkatan BUFF ──
    function singkatBuff(raw) {
      const r = raw.trim().toUpperCase();
      // Mapping eksplisit dulu
      const map = {
        'NON SHIFT'       : 'NS',
        'NONSHIFT'        : 'NS',
        'X NON SHIFT'     : 'XNS',   // bekas Non Shift
        'X NONSHIFT'      : 'XNS',
        'XNONSHIFT'       : 'XNS',
        'UMUM'            : 'UMUM',
        'PELUNCUR'        : 'PLR',
      };
      if (map[r] !== undefined) return map[r];
      // Jika sudah singkat (≤5 karakter), tampilkan apa adanya
      if (raw.length <= 5) return raw;
      // Fallback: ambil huruf kapital saja sebagai akronim
      const akronim = raw.match(/[A-Z]/g);
      return akronim ? akronim.join('') : raw;
    }

    function fitPolaTable() {

        const tabel   = document.getElementById('tabel-pola');

        const padPage  = parseFloat(getComputedStyle(page).paddingTop) + parseFloat(getComputedStyle(page).paddingBottom);
        const saveBarH = saveBar.classList.contains('visible') ? (saveBar.offsetHeight + 6) : 0;
        const availH   = page.clientHeight - padPage - saveBarH;

        if (availH <= 0) return;
        wrapper.style.height = availH + 'px';

        const rowH = Math.floor(availH / rows.length);
        wrapper.style.setProperty('--prow-h', Math.max(rowH, 20) + 'px');
        wrapper.style.setProperty('--ptbl-fs', '10px');
        wrapper.style.setProperty('--ptbl-fs-head', '12px');
      });
    }

    function syncJadwalSelect() {

      dest.innerHTML = '<option value="">— Pilih Bulan —</option>';

        const o = document.createElement('option');

        if (opt.value === prev) o.selected = true;
        dest.appendChild(o);
      });
      onJadwalBulanChange();
    }

    function onJadwalBulanChange() {
      const val = document.getElementById('select-jadwal-bulan').value;
      document.getElementById('btn-load-jadwal').style.display = val ? 'flex' : 'none';

    }

    async function loadJadwal() {
      const namaSheet = document.getElementById('select-jadwal-bulan').value;
      if (!namaSheet) return;
      const btn = document.getElementById('btn-load-jadwal');
      btn.disabled = true; btn.textContent = '⏳';
      showLoading('MEMUAT JADWAL...');
      document.getElementById('jadwal-table-wrapper').classList.remove('visible');
      document.getElementById('info-jadwal').textContent = '';
      try {
        // Baca G1:AM20 untuk temukan baris HARI/TGL, F1:F20 nama, H1:AL20 shift, AM6:AM15 kode
        const [rG, rF, rH, rK] = await Promise.all([
          fetch(`${APPS_SCRIPT_URL}?action=read&sheet=${encodeURIComponent(namaSheet)}&range=G1:AM20`, {redirect:'follow'}),
          fetch(`${APPS_SCRIPT_URL}?action=read&sheet=${encodeURIComponent(namaSheet)}&range=F1:F20`, {redirect:'follow'}),
          fetch(`${APPS_SCRIPT_URL}?action=read&sheet=${encodeURIComponent(namaSheet)}&range=H1:AL20`, {redirect:'follow'}),
          fetch(`${APPS_SCRIPT_URL}?action=read&sheet=${encodeURIComponent(namaSheet)}&range=AM6:AM15`, {redirect:'follow'}),
        ]);
        const [jG, jF, jH, jK] = await Promise.all([rG.json(), rF.json(), rH.json(), rK.json()]);
        if (jG.status!=='ok') throw new Error(jG.message);
        if (jF.status!=='ok') throw new Error(jF.message);
        if (jH.status!=='ok') throw new Error(jH.message);

        const grid = jG.data, namaGrid = jF.data, shiftGrid = jH.data;

        // Kode personil: AM6:AM15 → array 10 elemen (index 0 = baris ke-6 sheet)
        const kodePersonil = (jK.status === 'ok' ? jK.data : []).map(r => (r[0]||'').toString().trim().toUpperCase());

        // Cari baris HARI & TGL di kolom G (index 0 grid)
        let hariRowIdx = -1, tglRowIdx = -1;
        grid.forEach((row, r) => {
          const lbl = (row[0]||'').toString().trim().toUpperCase();
          if (lbl==='HARI') hariRowIdx = r;
          if (lbl==='TGL')  tglRowIdx  = r;
        });
        if (hariRowIdx===-1||tglRowIdx===-1) throw new Error('Baris HARI/TGL tidak ditemukan');

        const hariRow = grid[hariRowIdx], tglRow = grid[tglRowIdx];
        const hariList = [];
        for (let i=1; i<hariRow.length; i++) {
          const hari = (hariRow[i]||'').toString().trim().toUpperCase();
          const tgl  = Number(tglRow[i]);
          if (hari && !isNaN(tgl) && tgl>=1) hariList.push({colIdx:i-1, hari, tgl});
        }
        if (!hariList.length) throw new Error('Tidak ada kolom hari ditemukan');

        // Kumpulkan karyawan: baris di namaGrid setelah max(hariRowIdx, tglRowIdx)
        const afterRow = Math.max(hariRowIdx, tglRowIdx) + 1;
        const namaList = [], empRows = [];
        for (let r=afterRow; r<namaGrid.length; r++) {
          const nama = (namaGrid[r][0]||'').toString().trim();
          if (nama.length > 1) { namaList.push(nama); empRows.push(r); }
        }
        if (!namaList.length) throw new Error('Tidak ada karyawan ditemukan');

        // Map karyawan ke kode: empRows[ni] dikurangi afterRow → index di kodePersonil (0-based dari baris data)
        // F6:F15 = baris data mulai index afterRow, AM6:AM15 = kodePersonil[0..9]
        // empRows[ni] adalah index di namaGrid (F1:F20), afterRow juga index di namaGrid
        // Jadi kode karyawan ke-ni = kodePersonil[empRows[ni] - afterRow]
        const getKode = (ni) => kodePersonil[empRows[ni] - afterRow] || '';

        // Kelompokkan per minggu
        const minggu = []; let cur = [];
        hariList.forEach(h => {
          if (h.hari==='SEN' && cur.length) { minggu.push(cur); cur=[]; }
          cur.push(h);
        });
        if (cur.length) minggu.push(cur);

        // ── Colgroup: set lebar kolom eksplisit ──
        const colgroup = document.createElement('colgroup');
        const colNama = document.createElement('col');
        colNama.className = 'col-jadwal-nama';
        colgroup.appendChild(colNama);
        hariList.forEach(() => {
          const col = document.createElement('col');
          col.className = 'col-jadwal-shift';
          colgroup.appendChild(col);
        });
        const tabelJadwal = document.getElementById('tabel-jadwal');
        const existingCg = tabelJadwal.querySelector('colgroup');
        if (existingCg) existingCg.remove();
        tabelJadwal.insertBefore(colgroup, tabelJadwal.firstChild);

        // ── Header: baris 1 = NAMA(rowspan2) + MINGGU; baris 2 = HARI/TGL ──
        // Hitung index kolom terakhir tiap minggu (untuk border tebal)
        const lastColOfMinggu = new Set();
        let colCounter = 0;
        minggu.forEach(w => { colCounter += w.length; lastColOfMinggu.add(colCounter - 1); });

        let trM = '<tr><th class="th-nama" rowspan="2">NAMA</th>';
        minggu.forEach((w, wi) => {
          const isLast = wi === minggu.length - 1;
          trM += `<th colspan="${w.length}" class="th-minggu${isLast ? '' : ' th-minggu-last'}">MINGGU ${wi+1}</th>`;
        });
        trM += '</tr>';
        let trH = '<tr>';
        hariList.forEach((h, hi) => {
          const isSabMin = (h.hari==='SAB'||h.hari==='MIN');
          const isLast   = lastColOfMinggu.has(hi) && hi < hariList.length - 1;
          const cls = [isSabMin?'th-sabmin':'', isLast?'th-hari-last':''].filter(Boolean).join(' ');
          trH += `<th class="${cls}">${h.hari}<br><span style="font-size:.8em;opacity:.8;">${h.tgl}</span></th>`;
        });
        trH += '</tr>';
        document.getElementById('jadwal-thead').innerHTML = trM + trH;

        // ── Tbody: setiap baris mulai dengan td NAMA sticky, diwarnai berdasarkan kode ──
        let tbodyHtml = '';
        namaList.forEach((nama, ni) => {
          const shifts  = shiftGrid[empRows[ni]] || [];
          const kode    = getKode(ni);
          const clr     = kodeColor(kode);
          const rowBg   = clr.bg;

          tbodyHtml += `<tr>`;
          tbodyHtml += `<td class="td-nama" title="${nama}" style="background:${rowBg};color:${clr.text};">${nama}</td>`;
          hariList.forEach((h, hi) => {
            const val      = (shifts[h.colIdx]||'').toString().trim();
            const isSabMin = (h.hari==='SAB'||h.hari==='MIN');
            const isLast   = lastColOfMinggu.has(hi) && hi < hariList.length - 1;
            const lastCls  = isLast ? ' td-col-last' : '';
            if (isSabMin) {
              tbodyHtml += `<td class="shift-sabmin${lastCls}">${val||'–'}</td>`;
            } else if (val === '') {
              tbodyHtml += `<td class="shift-libur${lastCls}" style="background:${rowBg};"></td>`;
            } else {
              const badgeStyle = `background:${clr.btnBg};color:${clr.text};border:1px solid ${clr.shadow};box-shadow:0 2px 0 ${clr.shadow};border-radius:4px;padding:1px 4px;font-weight:900;display:inline-block;min-width:1.6em;line-height:1.4;font-size:.9em;`;
              tbodyHtml += `<td class="${lastCls.trim()}" style="background:${rowBg};"><span style="${badgeStyle}">${val}</span></td>`;
            }
          });
          tbodyHtml += `</tr>`;
        });
        document.getElementById('tbody-jadwal').innerHTML = tbodyHtml;

        document.getElementById('jadwal-table-wrapper').classList.add('visible');
        document.getElementById('info-jadwal').textContent =
          `${namaSheet} — ${namaList.length} karyawan, ${hariList.length} hari`;
        fitJadwalTable();
      } catch(err) {
        document.getElementById('info-jadwal').textContent = '❌ ' + err.message;
        showToast('❌ Gagal: ' + err.message, 'err', 8000);
      } finally {
        hideLoading(); btn.disabled=false; btn.textContent='LOAD';
      }
    }

    function fitJadwalTable() {
      requestAnimationFrame(() => {
        const wrapper = document.getElementById('jadwal-table-wrapper');
        const tabel   = document.getElementById('tabel-jadwal');
        const thead   = tabel.querySelector('thead');
        const rows    = tabel.querySelectorAll('tbody tr');
        if (!rows.length || !wrapper.classList.contains('visible')) return;

        // Biarkan layout selesai dulu, lalu ukur
        requestAnimationFrame(() => {
          const wrapH  = wrapper.clientHeight;
          const headH  = thead ? thead.offsetHeight : 0;
          const dataH  = wrapH - headH;
          const rowH   = Math.max(16, Math.floor(dataH / rows.length));
          const fs     = Math.min(12, Math.max(8, Math.floor(rowH * 0.58)));

          rows.forEach(tr => { tr.style.height = rowH + 'px'; });
          tabel.style.fontSize = fs + 'px';
        });
      });
    }

    // ══════════════════════════════════════════════════════
    // ── EDIT SHIFT POLA (mode admin) ──
    // ══════════════════════════════════════════════════════
    let _shiftPickerTarget = null; // div .shift-cell-edit yang sedang diedit

    function openShiftPicker(el, kode, hIdx, hNama) {
      if (!_isAdmin) return;
      _shiftPickerTarget = el;
      document.getElementById('shift-picker-label').textContent =
        `Kode ${kode} — Hari ${hNama}`;
      document.getElementById('shift-picker-overlay').classList.add('show');
    }

    function closeShiftPicker() {
      document.getElementById('shift-picker-overlay').classList.remove('show');
      _shiftPickerTarget = null;
    }

    function shiftPickerSelect(val) {
      if (!_shiftPickerTarget) { closeShiftPicker(); return; }
      const el = _shiftPickerTarget;
      // Update tampilan
      el.dataset.val = val;
      el.textContent = val || '–';
      // Reset class val-*
      el.className = el.className.replace(/\bval-\S+/g, '').trim();
      const vCls = val==='P' ? 'val-p' : val==='SM' ? 'val-sm' : val==='OFF' ? 'val-off' : 'val-kosong';
      el.classList.add(vCls);
      // Tambah kembali ::after via class (arrow indicator)
      closeShiftPicker();
    }

    async function doPolaSimpan() {
      // Kumpulkan semua data dari sel editable
      // Sheet POLA SHIFT, range F2:J12 (5 kolom hari, 10 baris kode)
      // Baris header (baris 1 sheet, indeks 0 tbody) dilewati
      const tbody = document.getElementById('tbody-pola');
      const rows  = tbody.querySelectorAll('tr');
      if (!rows.length) return;

      // Build values: array of rows, tiap row = [SEN, SEL, RAB, KAM, JUM]
      const values = [];
      rows.forEach(tr => {
        const cells = tr.querySelectorAll('[data-hari]');
        if (!cells.length) return; // baris tanpa data hari (misal header)
        const rowVals = [0,1,2,3,4].map(h => {
          const cell = tr.querySelector(`[data-hari="${h}"]`);
          if (!cell) return '';
          const badge = cell.querySelector('.shift-cell-edit');
          return badge ? (badge.dataset.val || '') : '';
        });
        values.push(rowVals);
      });

      if (!values.length) return;

      const btn    = document.getElementById('btn-pola-simpan');
      const status = document.getElementById('pola-save-status');
      btn.disabled = true;
      btn.textContent = '⏳ Menyimpan...';
      status.textContent = '';

      try {
        const res  = await fetch(APPS_SCRIPT_URL, {
          method: 'POST', redirect: 'follow',
          body: JSON.stringify({
            action: 'write',
            sheet:  'POLA SHIFT',
            range:  'F2:J' + (1 + values.length),
            values: values
          })
        });
        const json = await res.json();
        if (json.status !== 'ok') throw new Error(json.message);
        status.style.color = '#16a34a';
        status.textContent = '✅ Tersimpan!';
        btn.textContent = '💾 SIMPAN SHIFT';
        setTimeout(() => { status.textContent = ''; }, 3000);
        // Reload agar data sinkron + paksa rebuild dengan admin mode
        await loadPola();
      } catch(err) {
        status.style.color = '#dc2626';
        status.textContent = '❌ ' + err.message;
        btn.textContent = '💾 SIMPAN SHIFT';
      } finally {
        btn.disabled = false;
      }
    }

    // ── PIN MODAL ──
    let _pinValue = '';
    let _pinBenar = null;
    let _isAdmin  = false;

    function toggleAdmin() {
      if (_isAdmin) {
        _isAdmin = false;
        const btn = document.getElementById('btn-edit-header');
        btn.textContent = '🔒 ADMIN';
        btn.classList.remove('admin-on');
        // Kembalikan badge edit → badge biasa (tab seting)
        if (document.getElementById('tabel-wrapper').classList.contains('visible')) {
          _deactivateAdminBadges();
          document.getElementById('seting-save-bar').classList.remove('visible');
        }
        // Sembunyikan pola save bar & reload pola jika sedang di tab pola
        document.getElementById('pola-save-bar').classList.remove('visible');
        if (document.getElementById('pola').classList.contains('active')) {
          loadPola();
        } else if (document.getElementById('pola-wrapper').classList.contains('visible')) {
          fitPolaTable();
        }
      } else {
        loadPinThenOpen();
      }
    }

    async function loadPinThenOpen() {
      const btn = document.getElementById('btn-edit-header');
      btn.disabled = true;
      btn.textContent = '⏳...';
      showLoading('MEMUAT DATA...');

      try {
        const url = `${APPS_SCRIPT_URL}?action=read&sheet=${encodeURIComponent('POLA SHIFT')}&range=L3`;
        const res  = await fetch(url, { redirect: 'follow' });
        const json = await res.json();
        if (json.status !== 'ok') throw new Error(json.message);
        _pinBenar = (json.data?.[0]?.[0] || '').toString().trim();
        _pinValue = '';
        updatePinDisplay();
        document.getElementById('pin-status').textContent = '';
        document.getElementById('pin-overlay').classList.add('show');
      } catch (err) {
        showToast('❌ Gagal memuat PIN: ' + err.message, 'err', 4000);
      } finally {
        btn.disabled = false;
        btn.textContent = '🔒 ADMIN';
        hideLoading();
      }
    }

    function openPinModal() {
      _pinValue = '';
      _pinBenar = null;
      updatePinDisplay();
      document.getElementById('pin-status').textContent = '';
      document.getElementById('pin-overlay').classList.add('show');
    }

    function closePinModal() {
      document.getElementById('pin-overlay').classList.remove('show');
      _pinValue = '';
      updatePinDisplay();
      document.getElementById('pin-status').textContent = '';
    }

    function pinInput(digit) {
      if (_pinValue.length >= 6) return;
      _pinValue += digit;
      updatePinDisplay();
      if (_pinValue.length === 6) {
        setTimeout(checkPin, 150);
      }
    }

    function pinDelete() {
      _pinValue = _pinValue.slice(0, -1);
      updatePinDisplay();
      document.getElementById('pin-status').textContent = '';
    }

    function updatePinDisplay() {
      for (let i = 0; i < 6; i++) {
        const dot = document.getElementById('dot-' + i);
        dot.classList.toggle('filled', i < _pinValue.length);
      }
    }

    function checkPin() {
      if (_pinBenar === null) {
        document.getElementById('pin-status').style.color = '#dc2626';
        document.getElementById('pin-status').textContent = '❌ PIN belum termuat';
        _pinValue = '';
        setTimeout(() => updatePinDisplay(), 500);
        return;
      }
      if (_pinValue === _pinBenar) {
        document.getElementById('pin-status').style.color = '#16a34a';
        document.getElementById('pin-status').textContent = '✅ PIN benar!';
        _isAdmin = true;
        const btn = document.getElementById('btn-edit-header');
        btn.textContent = '🔓 LOGOUT';
        btn.classList.add('admin-on');
        setTimeout(() => {
          closePinModal();
          // Tab seting: aktifkan badge edit
          if (document.getElementById('tabel-wrapper').classList.contains('visible')) {
            _activateAdminBadges();
          }
          // Tab pola: reload agar cell shift jadi editable
          if (document.getElementById('pola').classList.contains('active')) {
            loadPola();
          }
        }, 800);
      } else {
        document.getElementById('pin-status').style.color = '#dc2626';
        document.getElementById('pin-status').textContent = '❌ PIN salah, coba lagi';
        _pinValue = '';
        setTimeout(() => {
          updatePinDisplay();
        }, 500);
      }
    }
  </script>
    
</body>
</html>
